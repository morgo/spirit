name: MySQL 8.0.42 (Aurora LTS version) /w docker-compose
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Detect non-docs changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

      - name: Test
        if: steps.filter.outputs.code == 'true'
        run: docker compose -f replication-ci.yml -f 8.0.42.yml up mysql mysql_replica test --abort-on-container-exit
        working-directory: compose/replication-tls

      - name: Skip — documentation-only change
        if: steps.filter.outputs.code != 'true'
        run: echo "Documentation-only change detected; skipping tests."

name: MySQL 8.0.45 (with replicas) /w docker-compose
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test
        run: docker compose -f replication-ci.yml up mysql mysql_replica test --abort-on-container-exit
        working-directory: compose/replication-tls

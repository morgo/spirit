name: MySQL 8.0 Build and Run /w docker-compose
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect non-docs changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

      - name: Build and Run Spirit
        if: steps.filter.outputs.code == 'true'
        run: docker compose up mysql buildandrun --abort-on-container-exit
        working-directory: compose

      - name: Skip — documentation-only change
        if: steps.filter.outputs.code != 'true'
        run: echo "Documentation-only change detected; skipping build."

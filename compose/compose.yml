services:
  mysql:
    image: mysql:8.0.45
    ports: [ '8033:3306' ]
    # to suppress mbind: Operation not permitted in CI
    # https://stackoverflow.com/a/55706057
    cap_add:
      - SYS_NICE
    environment:
      MYSQL_ROOT_PASSWORD: msandbox
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD
      start_period: 1s
      interval: 1s
      timeout: 2s
      retries: 60
    volumes:
      - mysql-standalone-data-dir:/var/lib/mysql
      - ./bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql
    # gtid-mode + enforce-gtid-consistency are required by the experimental
    # --gtid change source (pkg/change/gtid.go). The migration/move preflight
    # configurationCheck rejects --gtid runs when these are OFF, so CI must
    # boot with them ON to exercise the GTID path end-to-end. Version
    # overlays (8.0.28.yml, 8.0.43.yml, 9.7.yml) only override image/ports
    # so they inherit this command automatically.
    command: --gtid-mode=on --enforce-gtid-consistency=on

  test:
    build:
      context: ../
    command: bash -c "go test -json -race -v  -timeout=10m -parallel=4  ./... | tee /proc/1/fd/1 | tparse -all"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_DSN: tsandbox:msandbox@tcp(mysql)/test

  # Dedicated runner for the version-agnostic "single-version" suite
  # (pkg/migration/{resume,singleversion,lint}_test.go, behind
  # `//go:build singleversion`). It is gated to this one service so it isn't
  # re-run against every MySQL version in the matrix — these tests exercise
  # Spirit's own logic and don't vary by server version. Invoked by
  # .github/workflows/mysql8.0.45-singleversion-docker.yml against the base
  # 8.0.45 image (GTID enabled above, for the GTID resume tests). The -run filter
  # restricts the run to the suite's tests; see singleversion_test.go.
  singleversion-test:
    build:
      context: ../
    command: bash -c "go test -json -race -v -tags singleversion -run 'Resume|Checkpoint|UniqueOnNonUniqueData|ChunkerPrefetching|Unparsable|Lint' -timeout=10m -parallel=4 ./pkg/migration/... | tee /proc/1/fd/1 | tparse -all"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_DSN: tsandbox:msandbox@tcp(mysql)/test

  buildandrun:
    build:
      context: ../
    command: scripts/buildandrun.sh
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: mysql:3306
      USERNAME: msandbox
      PASSWORD: msandbox
      DATABASE: test
      TABLE: t1

  # Standalone reproducer for the binlog_order_commits=ON visibility race.
  # Not part of the regular test run — invoked explicitly via the
  # binlog-visibility-repro-matrix workflow.
  repro:
    build:
      context: ../
    command: bash -c "go build -o /tmp/repro ./cmd/binlog-visibility-repro && /tmp/repro -dsn 'tsandbox:msandbox@tcp(mysql:3306)/' -max-duration 5m"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-standalone-data-dir:

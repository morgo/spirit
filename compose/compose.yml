services:
  mysql:
    image: mysql:8.0.45
    ports: [ '8033:3306' ]
    # to suppress mbind: Operation not permitted in CI
    # https://stackoverflow.com/a/55706057
    cap_add:
      - SYS_NICE
    environment:
      MYSQL_ROOT_PASSWORD: msandbox
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD
      start_period: 1s
      interval: 1s
      timeout: 2s
      retries: 60
    volumes:
      - mysql-standalone-data-dir:/var/lib/mysql
      - ./bootstrap.sql:/docker-entrypoint-initdb.d/bootstrap.sql

  test:
    build:
      context: ../
    command: bash -c "go test -json -race -v  -timeout=10m -parallel=4  ./... | tee /proc/1/fd/1 | tparse -all"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_DSN: tsandbox:msandbox@tcp(mysql)/test

  buildandrun:
    build:
      context: ../
    command: scripts/buildandrun.sh
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: mysql:3306
      USERNAME: msandbox
      PASSWORD: msandbox
      DATABASE: test
      TABLE: t1

  # Standalone reproducer for the binlog_order_commits=ON visibility race.
  # Not part of the regular test run — invoked explicitly via the
  # binlog-visibility-repro-matrix workflow.
  repro:
    build:
      context: ../
    command: bash -c "go build -o /tmp/repro ./cmd/binlog-visibility-repro && /tmp/repro -dsn 'tsandbox:msandbox@tcp(mysql:3306)/' -max-duration 5m"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-standalone-data-dir:

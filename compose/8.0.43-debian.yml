services:
  mysql:
    # Debian-based variant of the same MySQL 8.0.43 binary. Used to
    # vary the container OS while holding MySQL version constant — see
    # the binlog-visibility-repro PR for context.
    #
    # Note: this tag only ships linux/amd64. On Apple Silicon Docker
    # will emulate via Rosetta/qemu, which is its own data point
    # (architecture + OS both differ from the default `mysql:8.0.43`).
    image: mysql:8.0.43-debian
    platform: linux/amd64
    ports: [ '8043:3306' ]
